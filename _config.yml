# 교육 Section
- title: (K-Digital Training)클라우드 활용 자바 개발자 양성과정(22회차)
  caption: 구디아카데미
  sub_title: 2024.08 ~ 2025.2
  description: |
    <br>
    <strong>교육</strong>
    - 1 개월차: input type, select 기능을 사용해 회원가입 페이지 구현, 조건문을 사용한 페이징 구현, 자바 calendar API를 활용한 달력 페이지 구현
    - 2 개월차: SQL 그룹함수(nvl, coalesce, group by, rollup, cube)를 활용한 데이터 정렬, GitHub를 이용한 학습 기록 및 복습 진행, multipart를 활용한 파일 업로드 기능 구현
    - 3 개월차: semi team project 진행, 자바스크립트를 활용한 유효성 검사, 알림 페이지 기능 구현
    - 4 개월차: Oracle JDBC 학습, 자바 프레임워크(STS4)를 MyBatis 활용해 Spring MVC 구조의 페이지 구현, jQuery, EL, JSTL 학습, AWS 배포 실행
    - 5 개월차: Final Team Project(그룹웨어 시스템) 진행

