# About Section
about_profile_image: https://fontawesome.com/icons/mug-hot?f=classic&s=light
about_content: |
  안녕하세요. 신입 백엔드 개발자 김은서입니다. 
  현재 Java, Spring Frame Work, MySql를 주로 사용하고있습니다.

  빠른 적응력을 바탕으로 문제를 정확하고 신속하게 해결하는 것을 중시하며,
  여러 부서와 기관과의 협업 경험을 통해 동료들과의 소통을 중시하는 자세를 갖추었습니다.

  업무 관련 지식을 채우기 위해서 CS 지식, 네트워크, 알고리즘 등을 공부하고 있으며,
  개발 문화와 요즘 많이 사용하는 기술 스택에 관심이 많아 .....를 따로 학습하며 꾸준히 발전하기 위해 노력하고 있습니다.

  <strong>기술 스택</strong>
  - 프레임워크 - <mark>Spring Boot</mark>
  - 언어 - <mark>Java 21</mark>, <mark>JavaScript</mark>
  - DB(Hibernate) - <mark>MySQL</mark>, <mark>Mybatis</mark>, <mark>QueryDSL</mark>
  - 도구 - <mark>Github</mark>, <mark>Eclipse IDE</mark>, <mark>Intelij IDE</mark>

